name: Build OpenWrt EA6350v3 QModem

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: "OpenWrt release version, for example 25.12.4"
        required: true
        default: "25.12.4"
        type: string
      qmodem_ref:
        description: "QModem branch, tag, or commit"
        required: true
        default: "main"
        type: string
      qmodem_ui:
        description: "QModem LuCI UI variant"
        required: true
        default: "modern"
        type: choice
        options:
          - modern
          - legacy
      qmodem_package_mode:
        description: "Use committed QModem prebuilt packages when available, or compile them in this run"
        required: true
        default: "prebuilt-or-build"
        type: choice
        options:
          - prebuilt-or-build
          - prebuilt-only
          - build-from-source
      create_release:
        description: "Also publish/update a GitHub Release"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

env:
  OPENWRT_TARGET_PATH: ipq40xx/generic
  OPENWRT_PROFILE: linksys_ea6350v3
  OPENWRT_ARCH_LABEL: arm_cortex-a7_neon-vfpv4
  OXYGEN_AIO_FEED_URL: https://github.com/makungyu/0xygen-AIO.git
  OXYGEN_AIO_REF: 1205f6c071e5dffdbf042e79058ef39e954ec00a
  OOKLA_SPEEDTEST_URL: https://install.speedtest.net/app/cli/ookla-speedtest-1.2.0-linux-armhf.tgz
  OOKLA_SPEEDTEST_SHA256: e45fcdebbd8a185553535533dd032d6b10bc8c64eee4139b1147b9c09835d08d

jobs:
  build:
    name: OpenWrt ${{ inputs.openwrt_version }} for Linksys EA6350v3
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Normalize inputs
        id: inputs
        shell: bash
        run: |
          set -euo pipefail

          version="${{ inputs.openwrt_version }}"
          version="${version#v}"

          if [[ ! "$version" =~ ^[0-9]+(\.[0-9]+){1,2}(-rc[0-9]+)?$ ]]; then
            echo "::error::openwrt_version must look like 25.12.4, 25.12.0-rc1, or 24.10"
            exit 1
          fi

          base_url="https://downloads.openwrt.org/releases/${version}/targets/${OPENWRT_TARGET_PATH}"
          dir_index="$(curl -fsSL "${base_url}/")"

          imagebuilder="$(grep -o "openwrt-imagebuilder-${version}-ipq40xx-generic\\.Linux-x86_64\\.tar\\.zst" <<<"$dir_index" | head -n1 || true)"
          sdk="$(grep -o "openwrt-sdk-${version}-ipq40xx-generic_[^\"]*\\.Linux-x86_64\\.tar\\.zst" <<<"$dir_index" | head -n1 || true)"

          if [[ -z "$imagebuilder" ]]; then
            echo "::error::ImageBuilder for OpenWrt ${version} (${OPENWRT_TARGET_PATH}) was not found"
            exit 1
          fi

          if [[ -z "$sdk" ]]; then
            echo "::error::SDK for OpenWrt ${version} (${OPENWRT_TARGET_PATH}) was not found"
            exit 1
          fi

          qmodem_ref="${{ inputs.qmodem_ref }}"
          if ! git ls-remote --exit-code https://github.com/FUjr/QModem.git "${qmodem_ref}" >/dev/null; then
            echo "::error::QModem ref ${qmodem_ref} was not found"
            exit 1
          fi

          artifact_name="openwrt-${version}-linksys-ea6350v3-qmodem-${{ inputs.qmodem_ui }}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "base_url=${base_url}" >> "$GITHUB_OUTPUT"
          echo "imagebuilder_url=${base_url}/${imagebuilder}" >> "$GITHUB_OUTPUT"
          echo "sdk_url=${base_url}/${sdk}" >> "$GITHUB_OUTPUT"
          echo "qmodem_ref=${qmodem_ref}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=${artifact_name}" >> "$GITHUB_OUTPUT"

      - name: Resolve QModem package source
        id: qmodem_packages
        shell: bash
        run: |
          set -euo pipefail

          mode="${{ inputs.qmodem_package_mode }}"
          prebuilt_dir="packages/qmodem/${{ steps.inputs.outputs.version }}/${{ inputs.qmodem_ui }}"
          use_prebuilt="false"

          if [[ "$mode" != "build-from-source" && -d "$prebuilt_dir" ]]; then
            shopt -s nullglob
            pkg_files=("$prebuilt_dir"/*.apk "$prebuilt_dir"/*.ipk)
            shopt -u nullglob

            if [[ "${#pkg_files[@]}" -gt 0 ]]; then
              if [[ -f "$prebuilt_dir/build-info.txt" ]] \
                && grep -Fxq "OpenWrt version: ${{ steps.inputs.outputs.version }}" "$prebuilt_dir/build-info.txt" \
                && grep -Fxq "QModem ref: ${{ steps.inputs.outputs.qmodem_ref }}" "$prebuilt_dir/build-info.txt" \
                && grep -Fxq "QModem UI: ${{ inputs.qmodem_ui }}" "$prebuilt_dir/build-info.txt"; then
                use_prebuilt="true"
              else
                echo "::warning::Found QModem prebuilt packages in ${prebuilt_dir}, but build-info.txt does not match this run."
              fi
            fi
          fi

          if [[ "$mode" == "prebuilt-only" && "$use_prebuilt" != "true" ]]; then
            echo "::error::No matching QModem prebuilt packages found in ${prebuilt_dir}. Run the 'Build QModem Packages' workflow first, or choose prebuilt-or-build/build-from-source."
            exit 1
          fi

          if [[ "$use_prebuilt" == "true" ]]; then
            package_source="prebuilt"
          else
            package_source="built in firmware workflow"
          fi

          echo "use_prebuilt=${use_prebuilt}" >> "$GITHUB_OUTPUT"
          echo "source=${package_source}" >> "$GITHUB_OUTPUT"
          echo "prebuilt_dir=${prebuilt_dir}" >> "$GITHUB_OUTPUT"
          echo "QModem package source: ${package_source} (${prebuilt_dir})"

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bison build-essential ca-certificates curl file flex gawk gettext git \
            libelf-dev libncurses-dev libssl-dev pkgconf python3 python3-pyelftools \
            rsync unzip wget zlib1g-dev zstd

      - name: Download OpenWrt SDK and ImageBuilder
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build
          cd build

          curl -fL --retry 5 --retry-delay 2 -o sdk.tar.zst "${{ steps.inputs.outputs.sdk_url }}"
          tar --use-compress-program=unzstd -xf sdk.tar.zst
          mv openwrt-sdk-* sdk

          curl -fL --retry 5 --retry-delay 2 -o imagebuilder.tar.zst "${{ steps.inputs.outputs.imagebuilder_url }}"
          tar --use-compress-program=unzstd -xf imagebuilder.tar.zst
          mv openwrt-imagebuilder-* imagebuilder

      - name: Use prebuilt QModem packages
        if: ${{ steps.qmodem_packages.outputs.use_prebuilt == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/qmodem-packages
          shopt -s nullglob
          cp -vf "${{ steps.qmodem_packages.outputs.prebuilt_dir }}"/*.apk build/qmodem-packages/ || true
          cp -vf "${{ steps.qmodem_packages.outputs.prebuilt_dir }}"/*.ipk build/qmodem-packages/ || true
          shopt -u nullglob
          cp -vf "${{ steps.qmodem_packages.outputs.prebuilt_dir }}/build-info.txt" build/qmodem-packages/qmodem-build-info.txt
          ls -lah build/qmodem-packages

      - name: Build QModem packages with SDK
        if: ${{ steps.qmodem_packages.outputs.use_prebuilt != 'true' }}
        working-directory: build/sdk
        shell: bash
        run: |
          set -euo pipefail

          printf '\nsrc-git qmodem https://github.com/FUjr/QModem.git;%s\n' "${{ steps.inputs.outputs.qmodem_ref }}" >> feeds.conf.default
          ./scripts/feeds update -a

          shopt -s nullglob
          for patch in "$GITHUB_WORKSPACE"/patches/qmodem/*.patch; do
            echo "Applying QModem patch: $(basename "$patch")"
            git -C feeds/qmodem apply --unidiff-zero --whitespace=fix "$patch"
          done
          shopt -u nullglob

          scan_script="feeds/qmodem/application/qmodem/files/usr/share/qmodem/modem_scan.sh"
          if [[ -f "$scan_script" ]]; then
            sed -i 's/\*"T99W175"\*/\*"t99w175"\*/g' "$scan_script"
          fi

          {
            echo "CONFIG_PACKAGE_qmodem=m"
            echo "CONFIG_PACKAGE_ubus-at-daemon=m"
            echo "CONFIG_PACKAGE_tom_modem=m"
            echo "CONFIG_PACKAGE_sms-tool_q=m"
            echo "CONFIG_PACKAGE_sms-forwarder=m"
            echo "CONFIG_PACKAGE_sms-forwarder-next=m"
            echo "CONFIG_PACKAGE_quectel-CM-5G-M=m"
            echo "CONFIG_PACKAGE_luci-app-qmodem-next=m"
            echo "CONFIG_PACKAGE_luci-app-qmodem=m"
            echo "CONFIG_PACKAGE_luci-app-qmodem-sms=m"
            echo "CONFIG_PACKAGE_luci-app-qmodem-mwan=m"
            echo "CONFIG_PACKAGE_luci-app-qmodem-ttlfw4=m"
            echo "CONFIG_PACKAGE_luci-app-qmodem_INCLUDE_ndisc6=y"
            echo "CONFIG_PACKAGE_luci-app-qmodem_INCLUDE_generic-qmi-wwan=y"
            echo "CONFIG_PACKAGE_luci-app-qmodem_USE_TOM_CUSTOMIZED_QUECTEL_CM=y"
          } >> .config

          if [[ "${{ inputs.qmodem_ui }}" == "modern" ]]; then
            install_packages=(
              ubus-at-daemon
              tom_modem
              sms-tool_q
              sms-forwarder-next
              quectel-CM-5G-M
              qmodem
              luci-app-qmodem-next
            )
            compile_dirs=(
              ubus_at_daemon
              tom_modem
              sms-tool_q
              sms_forwarder_next
              quectel_CM_5G_M
              qmodem
              luci-app-qmodem-next
            )
          else
            install_packages=(
              ubus-at-daemon
              tom_modem
              sms-tool_q
              sms-forwarder
              quectel-CM-5G-M
              qmodem
              luci-app-qmodem
              luci-app-qmodem-sms
              luci-app-qmodem-mwan
              luci-app-qmodem-ttlfw4
            )
            compile_dirs=(
              ubus_at_daemon
              tom_modem
              sms-tool_q
              sms_forwarder
              quectel_CM_5G_M
              qmodem
              luci-app-qmodem
              luci-app-qmodem-sms
              luci-app-qmodem-mwan
              luci-app-qmodem-ttlfw4
            )
          fi

          ./scripts/feeds install -f "${install_packages[@]}"
          make defconfig V=s

          for pkg_dir in "${compile_dirs[@]}"; do
            echo "Building ${pkg_dir}"
            make "package/feeds/qmodem/${pkg_dir}/compile" -j"$(nproc)" V=s || make "package/feeds/qmodem/${pkg_dir}/compile" -j1 V=s
          done

          mkdir -p ../qmodem-packages
          find bin/packages -type f \( -name '*.apk' -o -name '*.ipk' \) -path '*/qmodem/*' -print -exec cp -f {} ../qmodem-packages/ \;
          ls -lah ../qmodem-packages

      - name: Build LPAC packages without ModemManager
        working-directory: build/sdk
        shell: bash
        run: |
          set -euo pipefail

          oxygen_feed="$GITHUB_WORKSPACE/build/oxygen-aio-feed"
          rm -rf "$oxygen_feed"
          git clone "$OXYGEN_AIO_FEED_URL" "$oxygen_feed"
          git -C "$oxygen_feed" checkout --detach "$OXYGEN_AIO_REF"

          sed -i '/^src-git 0xygen_aio /d;/^src-link 0xygen_aio /d' feeds.conf.default
          printf '\nsrc-link 0xygen_aio %s\n' "$oxygen_feed" >> feeds.conf.default
          ./scripts/feeds update -a

          lpac_makefile="feeds/0xygen_aio/lpac/Makefile"
          if [[ ! -f "$lpac_makefile" ]]; then
            echo "::error::LPAC Makefile was not found at $lpac_makefile"
            exit 1
          fi

          python3 - <<'PY'
          from pathlib import Path

          makefile = Path("feeds/0xygen_aio/lpac/Makefile")
          lines = makefile.read_text().splitlines()
          patched = []

          for line in lines:
              if "+modemmanager" in line.lower():
                  if patched and patched[-1].rstrip().endswith("\\"):
                      patched[-1] = patched[-1].rstrip()[:-1].rstrip()
                  continue
              patched.append(line)

          makefile.write_text("\n".join(patched) + "\n")
          PY
          if grep -qi 'modemmanager' "$lpac_makefile"; then
            echo "::error::ModemManager dependency is still present in $lpac_makefile"
            exit 1
          fi

          ./scripts/feeds install -f -p 0xygen_aio lpac luci-app-lpac-manager 0xygen-aio
          ./scripts/feeds install \
            libmbim mbim-utils \
            libcurl curl ca-certificates ca-bundle \
            jq luci-base luci-compat luci-lua-runtime

          {
            echo "CONFIG_PACKAGE_lpac=m"
            echo "CONFIG_LPAC_WITH_AT=y"
            echo "CONFIG_LPAC_WITH_MBIM=y"
            echo "CONFIG_LPAC_WITH_PCSC=n"
            echo "CONFIG_LPAC_WITH_UQMI=n"
            echo "CONFIG_PACKAGE_luci-app-lpac-manager=m"
            echo "CONFIG_PACKAGE_0xygen-aio=m"
            echo "# CONFIG_PACKAGE_modemmanager is not set"
            echo "# CONFIG_PACKAGE_luci-proto-modemmanager is not set"
          } >> .config

          make defconfig V=s

          for pkg_dir in lpac luci-app-lpac-manager 0xygen-aio; do
            echo "Building ${pkg_dir} without ModemManager"
            make "package/feeds/0xygen_aio/${pkg_dir}/compile" -j"$(nproc)" V=s || make "package/feeds/0xygen_aio/${pkg_dir}/compile" -j1 V=s
          done

          mkdir -p ../lpac-packages
          find bin/packages -type f \( \
            -name 'lpac-*.apk' -o -name 'lpac_*.ipk' \
            -o -name 'luci-app-lpac-manager-*.apk' -o -name 'luci-app-lpac-manager_*.ipk' \
            -o -name '0xygen-aio-*.apk' -o -name '0xygen-aio_*.ipk' \
          \) -print -exec cp -f {} ../lpac-packages/ \;
          ls -lah ../lpac-packages

          if find ../lpac-packages -type f -iname '*modemmanager*' | grep -q .; then
            echo "::error::Unexpected ModemManager package found in LPAC output"
            exit 1
          fi

      - name: Build firmware image with ImageBuilder
        working-directory: build/imagebuilder
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p packages files
          cp -vf ../qmodem-packages/* packages/

          if compgen -G "$GITHUB_WORKSPACE/packages/prebuilt/*.apk" > /dev/null; then
            cp -vf "$GITHUB_WORKSPACE"/packages/prebuilt/*.apk packages/
          fi
          if compgen -G "$GITHUB_WORKSPACE/packages/prebuilt/*.ipk" > /dev/null; then
            cp -vf "$GITHUB_WORKSPACE"/packages/prebuilt/*.ipk packages/
          fi

          if [[ -d ../lpac-packages ]]; then
            rm -f packages/lpac-*.apk packages/lpac_*.ipk
            rm -f packages/luci-app-lpac-manager-*.apk packages/luci-app-lpac-manager_*.ipk
            rm -f packages/0xygen-aio-*.apk packages/0xygen-aio_*.ipk
            cp -vf ../lpac-packages/* packages/
          fi

          if [[ -d ../../files ]]; then
            rsync -a ../../files/ files/
          fi

          find files/etc/uci-defaults -type f -exec chmod 0755 {} \; 2>/dev/null || true
          find files/etc/init.d -type f -exec chmod 0755 {} \; 2>/dev/null || true
          find files/usr/bin -maxdepth 1 -type f -exec chmod 0755 {} \; 2>/dev/null || true

          if [[ -f ../../src/esim-telegram-bot.c ]]; then
            mkdir -p files/usr/bin
            export STAGING_DIR="$GITHUB_WORKSPACE/build/sdk/staging_dir"
            cc="$(find "$STAGING_DIR" -type f -name '*-openwrt-linux-*-gcc' | head -n1 || true)"
            if [[ -z "$cc" ]]; then
              echo "::error::OpenWrt SDK cross compiler was not found under $STAGING_DIR"
              exit 1
            fi
            "$cc" -Wall -Wextra -Os -s -o files/usr/bin/esim-telegram-bot ../../src/esim-telegram-bot.c
            chmod 0755 files/usr/bin/esim-telegram-bot
            ls -lh files/usr/bin/esim-telegram-bot
          fi

          speedtest_tgz="$GITHUB_WORKSPACE/build/ookla-speedtest-armhf.tgz"
          if [[ ! -f "$speedtest_tgz" ]]; then
            curl -fL --retry 5 --retry-delay 2 -o "$speedtest_tgz" "$OOKLA_SPEEDTEST_URL"
          fi
          echo "$OOKLA_SPEEDTEST_SHA256  $speedtest_tgz" | sha256sum -c -
          mkdir -p files/usr/libexec
          tar -xzf "$speedtest_tgz" -C files/usr/libexec speedtest
          mv -f files/usr/libexec/speedtest files/usr/libexec/ookla-speedtest
          chmod 0755 files/usr/libexec/ookla-speedtest

          if [[ "${{ inputs.qmodem_ui }}" == "modern" ]]; then
            qmodem_packages="qmodem luci-app-qmodem-next sms-forwarder-next quectel-CM-5G-M"
          else
            qmodem_packages="qmodem luci-app-qmodem luci-app-qmodem-sms luci-app-qmodem-mwan luci-app-qmodem-ttlfw4 sms-forwarder quectel-CM-5G-M"
          fi

          esim_packages="lpac luci-app-lpac-manager 0xygen-aio atinout luci-compat luci-lua-runtime libmbim mbim-utils libqmi uqmi jq coreutils-timeout libcurl4 curl ca-bundle ca-certificates"
          blocked_packages="-modemmanager -luci-proto-modemmanager"
          packages="luci ${qmodem_packages} ${esim_packages} ${blocked_packages} kmod-usb-net-cdc-mbim kmod-usb-serial-option kmod-usb-serial-qualcomm usbutils picocom"

          echo "Building ImageBuilder profile ${OPENWRT_PROFILE}"
          echo "Packages: ${packages}"
          make image PROFILE="${OPENWRT_PROFILE}" PACKAGES="${packages}" FILES="files/" V=s

          manifest="$(find "bin/targets/${OPENWRT_TARGET_PATH}" -maxdepth 1 -type f -name "*${OPENWRT_PROFILE}*.manifest" | head -n1 || true)"
          if [[ -z "$manifest" ]]; then
            echo "::error::Firmware package manifest was not produced"
            exit 1
          fi
          if ! grep -Eq '^lpac[[:space:]-]' "$manifest"; then
            echo "::error::lpac is missing from the firmware manifest"
            cat "$manifest"
            exit 1
          fi
          if ! grep -Eq '^luci-app-lpac-manager[[:space:]-]' "$manifest"; then
            echo "::error::luci-app-lpac-manager is missing from the firmware manifest"
            cat "$manifest"
            exit 1
          fi
          if ! grep -Eq '^libmbim[[:space:]-]' "$manifest"; then
            echo "::error::libmbim is missing from the firmware manifest; /usr/libexec/mbim-proxy comes from libmbim"
            cat "$manifest"
            exit 1
          fi
          if ! grep -Eq '^mbim-utils[[:space:]-]' "$manifest"; then
            echo "::error::mbim-utils is missing from the firmware manifest"
            cat "$manifest"
            exit 1
          fi
          if grep -Eq '^(modemmanager|luci-proto-modemmanager)[[:space:]-]' "$manifest"; then
            echo "::error::ModemManager package unexpectedly entered the firmware manifest"
            grep -Ei 'modemmanager|lpac' "$manifest" || true
            exit 1
          fi
          echo "LPAC/ModemManager manifest validation passed:"
          grep -E '^(lpac|luci-app-lpac-manager|0xygen-aio|libmbim|mbim-utils)[[:space:]-]' "$manifest" || true

      - name: Collect artifacts
        shell: bash
        run: |
          set -euo pipefail

          target_dir="build/imagebuilder/bin/targets/${OPENWRT_TARGET_PATH}"
          mkdir -p firmware

          echo "Target directory contents:"
          find "$target_dir" -maxdepth 2 -type f -printf '%p %k KB\n' | sort

          mapfile -t images < <(find "$target_dir" -maxdepth 1 -type f \( -name '*linksys_ea6350v3*' -o -name '*sha256sums' -o -name '*profiles.json' \) | sort)
          if [[ "${#images[@]}" -eq 0 ]]; then
            echo "::error::No Linksys EA6350v3 firmware images were produced. The image may be too large for IMAGE_SIZE=35840k, or ImageBuilder rejected a package dependency."
            exit 1
          fi

          cp -v "${images[@]}" firmware/

          {
            echo "OpenWrt version: ${{ steps.inputs.outputs.version }}"
            echo "QModem ref: ${{ steps.inputs.outputs.qmodem_ref }}"
            echo "QModem UI: ${{ inputs.qmodem_ui }}"
            echo "QModem package source: ${{ steps.qmodem_packages.outputs.source }}"
            echo "Target: Linksys EA6350v3 / ${OPENWRT_TARGET_PATH} / ${OPENWRT_ARCH_LABEL}"
            echo "Builder: OpenWrt SDK + ImageBuilder"
            echo "eSIM stack: lpac, luci-app-lpac-manager, 0xygen-aio, Telegram bot, HYFE IMAP helpers, Ookla speedtest"
            echo "LPAC defaults: MBIM /dev/cdc-wdm0, mbim-proxy=1, mbim-skip-slot=1, AT /dev/ttyUSB2, modem_iface=1_1"
            echo "ModemManager: excluded; QModem owns MBIM /dev/cdc-wdm0 and wwan0"
          } > firmware/build-info.txt

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.inputs.outputs.artifact_name }}
          path: firmware/*
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        if: ${{ inputs.create_release }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: openwrt-${{ steps.inputs.outputs.version }}-ea6350v3-qmodem
          RELEASE_NAME: OpenWrt ${{ steps.inputs.outputs.version }} EA6350v3 QModem
        run: |
          set -euo pipefail

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" firmware/* --clobber
          else
            gh release create "$TAG_NAME" firmware/* \
              --title "$RELEASE_NAME" \
              --notes "Custom OpenWrt ${{ steps.inputs.outputs.version }} firmware for Linksys EA6350v3 with QModem (${{ steps.inputs.outputs.qmodem_ref }}) and LPAC eSIM tools."
          fi
